# ==============================================================
# Sunbird Serve Need - Application Configuration
# ==============================================================
# All values are controlled via environment variables.
# Defaults are safe for local development.
# For production, set env vars via Docker/systemd/CI — never hardcode.
# ==============================================================

# Server
server.port=9000
server.servlet.context-path=/api/v1/serve-need/

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/serve-need}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:300000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT:20000}

# JPA
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:25}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# Logging
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:WARN}
logging.level.com.sunbird.serve.need=${APP_LOG_LEVEL:INFO}
logging.level.reactor.netty.http.client.HttpClient=${NETTY_LOG_LEVEL:WARN}
logging.file.name=${LOG_FILE_NAME:needLog.log}
logging.pattern.console=%d [%level] %c{1.} [%t] %m%n
logging.pattern.file=%d [%level] %c{1.} [%t] %m%n

# Error Handling
server.error.include-exception=${INCLUDE_EXCEPTION:false}
server.error.include-stacktrace=${INCLUDE_STACKTRACE:never}
server.error.whitelabel.enabled=false

# Actuator
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info,metrics}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_DETAILS:when-authorized}
management.endpoint.health.show-components=always

# Swagger / SpringDoc
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# Security
basic.auth.username=${BASIC_AUTH_USERNAME:admin}
basic.auth.password=${BASIC_AUTH_PASSWORD:admin}

# CORS (to be used by centralized config later)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
